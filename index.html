<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUBG Interactive Experience - Toggle Mode</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Clickable SVG UI layout layer */
        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Outline Glow Paths */
        .outline-path {
            fill: transparent;
            stroke: rgba(0, 204, 255, 0.8);
            stroke-width: 3;
            stroke-dasharray: 8 4;
            opacity: 0;
            pointer-events: auto;
            cursor: pointer;
            transition: opacity 0.3s, stroke-dashoffset 2s linear;
        }
        
        .outline-path:hover {
            opacity: 1;
            stroke-dashoffset: -50;
            filter: drop-shadow(0px 0px 8px rgba(0, 204, 255, 0.9));
        }

        /* Floating Tooltip UI Element */
        #tooltip {
            position: absolute;
            z-index: 3;
            background: rgba(10, 25, 40, 0.85);
            border: 1px solid rgba(0, 204, 255, 0.5);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 204, 255, 0.25), inset 0 0 8px rgba(0,204,255,0.1);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -130%) scale(0.9);
            transition: opacity 0.2s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #tooltip.active {
            opacity: 1;
            transform: translate(-50%, -130%) scale(1);
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <svg id="ui-overlay" viewBox="0 0 768 1024">
        <path id="path-helmet" class="outline-path" data-item="helmet"
              d="M 28,452 C 28,420 50,380 100,378 C 150,376 175,410 195,430 C 210,445 195,485 160,495 C 120,505 50,490 28,452 Z" />
        
        <path id="path-vest" class="outline-path" data-item="vest"
              d="M 125,750 C 120,740 160,735 200,738 C 240,740 250,755 260,780 C 270,810 290,850 280,920 C 270,955 160,965 120,950 C 95,940 90,830 110,790 Z" />
    </svg>

    <div id="tooltip">BPM</div>

    <script>
        // --- 1. Configurations & State Mapping ---
        const HOTSPOTS = {
            helmet: { x: 0.11, y: 0.56, radius: 0.09 }, 
            vest:   { x: 0.24, y: 0.16, radius: 0.15 }
        };

        let isZoomed = false; // State flag tracker
        const tooltip = document.getElementById('tooltip');
        const uiOverlay = document.getElementById('ui-overlay');

        // --- 2. Three.js Engine Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 3. Textures Asset Pipeline ---
        const textureLoader = new THREE.TextureLoader();
        const textureBefore = textureLoader.load('before.png', () => { updatePlaneScale(); });
        const textureAfter = textureLoader.load('after.png');

        textureBefore.minFilter = THREE.LinearFilter;
        textureAfter.minFilter = THREE.LinearFilter;

        // --- 4. Cross-fade Fragment Shader ---
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTexBefore: { value: textureBefore },
                uTexAfter: { value: textureAfter },
                uTransitionProgress: { value: 0.0 },
                uEpicenter: { value: new THREE.Vector2(0.5, 0.5) },
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D uTexBefore;
                uniform sampler2D uTexAfter;
                uniform float uTransitionProgress;
                uniform vec2 uEpicenter;
                uniform vec2 uResolution;

                void main() {
                    vec2 aspectCorrectedUv = vUv;
                    aspectCorrectedUv.x *= (uResolution.x / uResolution.y);
                    vec2 correctedEpicenter = uEpicenter;
                    correctedEpicenter.x *= (uResolution.x / uResolution.y);

                    float dist = distance(aspectCorrectedUv, correctedEpicenter);
                    float radius = uTransitionProgress * 2.5; 
                    
                    float edgeSmoothness = 0.18;
                    float wave = smoothstep(radius - edgeSmoothness, radius, dist);

                    vec4 colorBefore = texture2D(uTexBefore, vUv);
                    vec4 colorAfter = texture2D(uTexAfter, vUv);
                    gl_FragColor = mix(colorAfter, colorBefore, wave);
                }
            `
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);

        // --- 5. Integrated Interactive Event Listeners ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function checkIntersect(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(mesh);

            if (intersects.length > 0) {
                const uv = intersects[0].uv;
                for (const key in HOTSPOTS) {
                    const spot = HOTSPOTS[key];
                    if (Math.hypot(uv.x - spot.x, uv.y - spot.y) < spot.radius) {
                        return { name: key, uv: uv };
                    }
                }
            }
            return null;
        }

        // Mouse move interactions (Only track highlights if zoomed out)
        window.addEventListener('mousemove', (e) => {
            if (isZoomed) return;

            const hit = checkIntersect(e.clientX, e.clientY);
            
            if (hit) {
                document.querySelectorAll('.outline-path').forEach(p => p.style.opacity = '0');
                const path = document.getElementById(`path-${hit.name}`);
                if (path) path.style.opacity = '1';

                if (hit.name === 'helmet') {
                    tooltip.style.left = `${e.clientX}px`;
                    tooltip.style.top = `${e.clientY}px`;
                    tooltip.classList.add('active');
                } else {
                    tooltip.classList.remove('active');
                }
            } else {
                document.querySelectorAll('.outline-path').forEach(p => p.style.opacity = '0');
                tooltip.classList.remove('active');
            }
        });

        // Toggle state logic on Click
        window.addEventListener('click', (e) => {
            if (isZoomed) {
                // If already zoomed in, clicking anywhere resets the view back to normal
                resetView();
            } else {
                // If zoomed out, check if an item was targeted
                const hit = checkIntersect(e.clientX, e.clientY);
                if (hit) {
                    tooltip.classList.remove('active');
                    uiOverlay.style.opacity = '0';
                    triggerExplosion(hit.uv.x, hit.uv.y);
                }
            }
        });

        // Touch device toggle support
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                if (isZoomed) {
                    resetView();
                } else {
                    const hit = checkIntersect(touch.clientX, touch.clientY);
                    if (hit) {
                        uiOverlay.style.opacity = '0';
                        triggerExplosion(hit.uv.x, hit.uv.y);
                    }
                }
            }
        }, { passive: true });

        // --- 6. Core Animations ---
        function triggerExplosion(clickX, clickY) {
            isZoomed = true;
            shaderMaterial.uniforms.uEpicenter.value.set(clickX, clickY);

            const tl = gsap.timeline();
            tl.to(shaderMaterial.uniforms.uTransitionProgress, { value: 1.0, duration: 1.3, ease: "power2.out" }, 0);
            tl.to(mesh.scale, { x: 2.5, y: 2.5, duration: 1.5, ease: "expo.out" }, 0);

            const targetX = (0.5 - clickX) * 2.5;
            const targetY = (clickY - 0.5) * 2.5;
            tl.to(mesh.position, { x: targetX, y: targetY, duration: 1.5, ease: "expo.out" }, 0);

            // Shaker shockwave
            tl.to(mesh.position, {
                x: targetX + (Math.random() - 0.5) * 0.03,
                y: targetY + (Math.random() - 0.5) * 0.03,
                duration: 0.04, repeat: 4, yoyo: true
            }, 0.05);
        }

        function resetView() {
            const tl = gsap.timeline();
            tl.to(mesh.scale, { x: 1, y: 1, duration: 1.2, ease: "power3.inOut" }, 0);
            tl.to(mesh.position, { x: 0, y: 0, duration: 1.2, ease: "power3.inOut" }, 0);
            tl.to(shaderMaterial.uniforms.uTransitionProgress, { value: 0.0, duration: 0.9, ease: "power2.inOut" }, 0.1);

            tl.call(() => { 
                isZoomed = false; 
                uiOverlay.style.opacity = '1';
            });
        }

        // --- 7. Responsive Calculations ---
        function updatePlaneScale() {
            if (!textureBefore.image) return;
            
            const imageAspect = 3 / 4; 
            const screenAspect = window.innerWidth / window.innerHeight;

            let w, h;
            if (screenAspect > imageAspect) {
                mesh.scale.set(1, 1 / (screenAspect / imageAspect), 1);
                h = window.innerHeight;
                w = h * imageAspect;
            } else {
                mesh.scale.set((screenAspect / imageAspect), 1, 1);
                w = window.innerWidth;
                h = w / imageAspect;
            }
            
            uiOverlay.style.width = `${w}px`;
            uiOverlay.style.height = `${h}px`;

            shaderMaterial.uniforms.uResolution.value.set(
                window.innerWidth * window.devicePixelRatio, 
                window.innerHeight * window.devicePixelRatio
            );
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            updatePlaneScale();
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
