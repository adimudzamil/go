<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VICTOR — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8a84b;
  --gold-light: #f0d070;
  --orange: #ff6b2b;
  --fire: #ff4500;
  --dark: #0a0a0a;
  --darker: #060608;
  --panel: rgba(10,12,18,0.92);
  --border: rgba(200,168,75,0.3);
  --text: #d4c8a8;
  --text-dim: #7a7060;
  --scanline: rgba(200,168,75,0.03);
  --green: #00ff88;
  --red: #ff2244;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--darker);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ─── SCANLINE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 40px;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
.nav-logo span { color: var(--orange); }

.nav-links { display: flex; gap: 32px; }
.nav-links a {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-decoration: none;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -4px; left: 0; right: 0; height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.2s;
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-status {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--green);
  letter-spacing: 0.15em;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
}

/* ─── HERO SECTION ─── */
#hero {
  position: relative;
  height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

.hero-image-container {
  position: relative;
  width: min(500px, 90vw);
  aspect-ratio: 0.65;
  cursor: default;
}

/* Before/After images */
.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 2px;
  transition: opacity 0.1s;
}
#img-before { opacity: 1; }
#img-after  { opacity: 0; }

/* Explosion transition */
.hero-image-container.exploding #img-before { opacity: 0; }
.hero-image-container.exploding #img-after  {
  opacity: 1;
  animation: explosion-reveal 0.6s ease-out forwards;
}
@keyframes explosion-reveal {
  0%   { filter: brightness(5) saturate(3); transform: scale(1.05); }
  30%  { filter: brightness(2) saturate(2); }
  100% { filter: brightness(1) saturate(1); transform: scale(1); }
}

/* Image frame */
.hero-image-container::before,
.hero-image-container::after {
  content: '';
  position: absolute;
  pointer-events: none;
  z-index: 10;
}
.hero-image-container::before {
  inset: 0;
  border: 1px solid var(--border);
  border-radius: 2px;
}
.img-frame-corners {
  position: absolute; inset: -1px;
  z-index: 11; pointer-events: none;
}
.img-frame-corners::before, .img-frame-corners::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--gold);
  border-style: solid;
}
.img-frame-corners::before {
  top: 0; left: 0;
  border-width: 2px 0 0 2px;
}
.img-frame-corners::after {
  bottom: 0; right: 0;
  border-width: 0 2px 2px 0;
}

/* HUD elements on image */
.hud-overlay {
  position: absolute; inset: 0; z-index: 12; pointer-events: none;
}
.hud-crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 60px; height: 60px;
  opacity: 0;
  transition: opacity 0.2s;
}
.hud-crosshair::before, .hud-crosshair::after {
  content: '';
  position: absolute;
  background: var(--gold);
  opacity: 0.5;
}
.hud-crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
.hud-crosshair::after  { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
.hero-image-container:hover .hud-crosshair { opacity: 1; }

.hud-label {
  position: absolute; bottom: 12px; left: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  opacity: 0.7;
}
.hud-zone {
  position: absolute; top: 12px; right: 12px;
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  color: var(--red);
  letter-spacing: 0.2em;
  animation: blink-red 1.5s infinite;
}
@keyframes blink-red {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ─── HELMET CLICKABLE ZONE ─── */
.clickzone {
  position: absolute;
  z-index: 20;
  cursor: crosshair;
}
#zone-helmet {
  /* Helmet is bottom-left area of image, roughly */
  left: 5%; top: 52%;
  width: 26%; height: 18%;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--gold);
  padding: 8px 14px;
  border-radius: 2px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--gold-light);
  letter-spacing: 0.1em;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s, transform 0.15s;
  z-index: 30;
  top: -70px; left: -10px;
}
.tooltip::before {
  content: attr(data-type);
  display: block;
  font-size: 0.5rem;
  color: var(--orange);
  letter-spacing: 0.2em;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.tooltip::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 20px;
  width: 10px; height: 10px;
  background: var(--panel);
  border-right: 1px solid var(--gold);
  border-bottom: 1px solid var(--gold);
  transform: rotate(45deg);
}
.clickzone:hover .tooltip {
  opacity: 1;
  transform: translateY(0);
}

/* Clickzone pulse ring */
.clickzone::before {
  content: '';
  position: absolute;
  inset: -4px;
  border: 1px solid var(--gold);
  opacity: 0;
  border-radius: 2px;
  transition: opacity 0.2s;
  animation: zone-pulse 2s infinite;
}
.clickzone:hover::before { opacity: 1; }
@keyframes zone-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,168,75,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(200,168,75,0); }
}

/* ─── HERO TEXT FLANKS ─── */
.hero-left, .hero-right {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 20px;
}
.hero-left { left: 40px; align-items: flex-start; }
.hero-right { right: 40px; align-items: flex-end; }

.hero-stat {
  display: flex; flex-direction: column; gap: 2px;
}
.stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
}
.stat-bar {
  width: 100px; height: 2px;
  background: rgba(200,168,75,0.15);
  position: relative; overflow: hidden;
}
.stat-bar-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  animation: stat-fill 2s ease-out forwards;
}
@keyframes stat-fill { from { width: 0; } }

.hero-title-top {
  position: absolute;
  top: 80px; left: 50%; transform: translateX(-50%);
  text-align: center;
  z-index: 5;
}
.hero-title-top h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-shadow: 0 0 40px rgba(200,168,75,0.5);
}
.hero-title-top p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.35em;
  margin-top: 4px;
  text-transform: uppercase;
}

.scroll-indicator {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  animation: bounce 2s infinite;
}
.scroll-indicator::after {
  content: '';
  width: 1px; height: 40px;
  background: linear-gradient(180deg, var(--gold), transparent);
}
@keyframes bounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(6px); }
}

/* ─── INFO BOX (SCI-FI MODAL) ─── */
#infobox-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(6px);
}
#infobox-overlay.active {
  opacity: 1; pointer-events: all;
}

.infobox {
  position: relative;
  width: min(900px, 95vw);
  background: var(--panel);
  border: 1px solid var(--gold);
  padding: 0;
  overflow: hidden;
  transform: scale(0.92);
  transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
#infobox-overlay.active .infobox {
  transform: scale(1);
}

/* Animated corner brackets */
.infobox-corners {
  position: absolute; inset: 0; pointer-events: none; z-index: 5;
}
.infobox-corners::before, .infobox-corners::after,
.infobox-corners span::before, .infobox-corners span::after {
  content: '';
  position: absolute;
  width: 30px; height: 30px;
  border-color: var(--gold-light);
  border-style: solid;
}
.infobox-corners::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
.infobox-corners::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
.infobox-corners span::before { top: 0; right: 0; border-width: 2px 2px 0 0; }
.infobox-corners span::after  { bottom: 0; left: 0; border-width: 0 0 2px 2px; }

/* Infobox header */
.infobox-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(200,168,75,0.05);
}
.infobox-title-group { display: flex; flex-direction: column; gap: 2px; }
.infobox-code {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--orange);
  letter-spacing: 0.3em;
}
.infobox-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.15em;
}
.infobox-close {
  background: none; border: 1px solid var(--border);
  color: var(--gold); cursor: pointer;
  font-family: 'Orbitron', monospace; font-size: 0.7rem;
  padding: 6px 12px;
  letter-spacing: 0.2em;
  transition: all 0.2s;
}
.infobox-close:hover { background: var(--red); border-color: var(--red); color: #fff; }

/* Infobox body */
.infobox-body {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0;
}
.infobox-image-panel {
  position: relative; overflow: hidden;
  max-height: 420px;
}
.infobox-image-panel img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.img-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 60%, var(--panel) 100%);
}
.fire-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,100,20,0.25) 0%, transparent 70%);
  animation: fire-flicker 0.3s infinite alternate;
}
@keyframes fire-flicker {
  0% { opacity: 0.8; }
  100% { opacity: 1; }
}

.infobox-data-panel {
  padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
}

.data-row {
  display: flex; flex-direction: column; gap: 4px;
  border-bottom: 1px solid rgba(200,168,75,0.08);
  padding-bottom: 14px;
}
.data-row:last-child { border-bottom: none; }
.data-key {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.data-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.05em;
}
.data-val.highlight { color: var(--orange); font-family: 'Orbitron', monospace; font-size: 0.9rem; }
.data-val.green { color: var(--green); }

.protection-bars { display: flex; flex-direction: column; gap: 6px; }
.pbar-row { display: flex; align-items: center; gap: 10px; }
.pbar-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  width: 80px;
  letter-spacing: 0.1em;
}
.pbar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.pbar-fill {
  height: 100%;
  border-radius: 2px;
  animation: pbar-anim 1.2s ease-out forwards;
}
@keyframes pbar-anim { from { width: 0; } }
.pbar-fill.gold { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.pbar-fill.green { background: linear-gradient(90deg, #00aa55, var(--green)); }
.pbar-fill.orange { background: linear-gradient(90deg, #cc3300, var(--orange)); }

/* Scanning animation */
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
  animation: scan 3s linear infinite;
}
@keyframes scan {
  0%   { top: 0; }
  100% { top: 100%; }
}

/* ─── SECTION COMMON ─── */
section { position: relative; padding: 100px 0; }
.section-header {
  text-align: center;
  margin-bottom: 60px;
}
.section-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--orange);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}
.section-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.section-line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 16px auto 0;
}

/* ─── ABOUT SECTION ─── */
#about {
  background: linear-gradient(180deg, var(--darker) 0%, rgba(10,8,4,1) 100%);
}
.about-grid {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.about-text p {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 16px;
}
.about-text p span { color: var(--gold); font-weight: 600; }
.about-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
.tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  padding: 5px 12px;
  border: 1px solid var(--border);
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: rgba(200,168,75,0.05);
  transition: all 0.2s;
}
.tag:hover { background: rgba(200,168,75,0.12); border-color: var(--gold); }

.about-stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.stat-card {
  background: rgba(200,168,75,0.04);
  border: 1px solid var(--border);
  padding: 20px;
  position: relative;
  transition: all 0.3s;
}
.stat-card:hover {
  background: rgba(200,168,75,0.08);
  border-color: var(--gold);
  transform: translateY(-2px);
}
.stat-card-number {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 900;
  color: var(--gold);
  display: block;
}
.stat-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 4px;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.stat-card:hover::before { opacity: 1; }

/* ─── 3D CARD SLIDER ─── */
#works {
  background: var(--darker);
  overflow: hidden;
}

.slider-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
}

/* Lundev-style 3D slider */
.slider-3d {
  position: relative;
  height: 420px;
  perspective: 1000px;
  margin-bottom: 50px;
}

.slider-3d-track {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.slide-card {
  position: absolute;
  width: 280px;
  height: 380px;
  top: 50%; left: 50%;
  margin: -190px -140px;
  background: var(--panel);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.5s;
  backface-visibility: hidden;
}
.slide-card img {
  width: 100%; height: 60%;
  object-fit: cover;
  display: block;
  filter: grayscale(20%) contrast(1.1);
  transition: filter 0.4s, transform 0.4s;
}
.slide-card:hover img { filter: grayscale(0) contrast(1.1); transform: scale(1.04); }
.slide-card-content { padding: 16px; }
.slide-card-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--orange);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.slide-card-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.slide-card-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.slide-card-line {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.slide-card.active .slide-card-line { opacity: 1; }

/* Slider nav */
.slider-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; margin-top: 30px;
}
.slider-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--gold);
  width: 44px; height: 44px;
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.slider-btn:hover { background: rgba(200,168,75,0.1); border-color: var(--gold); }

.slider-dots { display: flex; gap: 8px; }
.dot {
  width: 6px; height: 6px;
  background: var(--border);
  border-radius: 0;
  cursor: pointer;
  transition: all 0.2s;
}
.dot.active { background: var(--gold); width: 20px; }

/* ─── SKILLS BAR SECTION ─── */
#skills {
  background: linear-gradient(180deg, rgba(10,8,4,1) 0%, var(--darker) 100%);
}
.skills-grid {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.skill-row {
  display: flex; flex-direction: column; gap: 6px;
}
.skill-header {
  display: flex; justify-content: space-between; align-items: center;
}
.skill-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.1em;
